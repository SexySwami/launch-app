<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Launch" />
<meta name="theme-color" content="#05070C" />
<title>Launch — Mission Control for Momentum</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  html, body, #root {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #05070C;
    color: #fff;
    font-family: "Space Grotesk", -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
  }
  body {
    overflow: hidden;
    /* Lock to fill the viewport including dynamic UI on mobile. */
    position: fixed;
    width: 100%;
    height: 100vh;
    height: 100dvh;
  }
  #root {
    width: 100%;
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  * { box-sizing: border-box; }
  button, [role="button"], input {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  ::selection { background: rgba(0,229,255,0.4); color: #fff; }

  @keyframes blink { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1 } 50% { transform: scale(1.4); opacity: 0.6 } }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity: 0.85 } 50% { transform: scale(1.06); opacity: 1 } }
  @keyframes ringPulse {
    0%   { transform: scale(0.85); opacity: 0.6 }
    100% { transform: scale(1.15); opacity: 0   }
  }
  @keyframes countIn {
    0%   { transform: scale(1.4); opacity: 0; filter: blur(20px) }
    60%  { transform: scale(1);   opacity: 1; filter: blur(0)    }
    100% { transform: scale(1);   opacity: 1                     }
  }
  @keyframes rayPulse {
    0%, 100% { opacity: 0.3 }
    50%      { opacity: 0.9 }
  }
  @keyframes modalIn {
    0%   { transform: scale(0.94) translateY(8px); opacity: 0 }
    100% { transform: scale(1)    translateY(0);   opacity: 1 }
  }
  @keyframes backdropIn {
    0%   { opacity: 0 }
    100% { opacity: 1 }
  }
  @keyframes optionIn {
    0%   { transform: translateY(8px); opacity: 0 }
    100% { transform: translateY(0);   opacity: 1 }
  }
  @keyframes spin360 { to { transform: rotate(360deg) } }
  @keyframes shimmer {
    0%   { background-position: 200% 50% }
    100% { background-position: -200% 50% }
  }
  @keyframes greenPulse {
    0% {
      box-shadow: 0 0 18px 5px rgba(0, 255, 110, 0.65), inset 0 0 0 1px rgba(0, 255, 110, 0.5);
      background-color: rgba(0, 255, 110, 0.18);
    }
    100% {
      box-shadow: 0 0 0 0 rgba(0, 255, 110, 0);
      background-color: rgba(0, 255, 110, 0);
    }
  }
  .new-item-highlight {
    animation: greenPulse 1s ease-out;
  }
  @keyframes toastIn {
    0%   { transform: translateY(24px); opacity: 0 }
    100% { transform: translateY(0);    opacity: 1 }
  }
  @keyframes toastDrain {
    0%   { width: 100% }
    100% { width: 0%   }
  }
  @keyframes marqueeScroll {
    0%   { transform: translateX(0) }
    100% { transform: translateX(-50%) }
  }

  /* Hide native input clear/cancel chrome on iOS */
  input::-webkit-search-decoration,
  input::-webkit-search-cancel-button,
  input::-webkit-search-results-button,
  input::-webkit-search-results-decoration { display: none; }

  /* Slim, cyan-tinted scrollbar — matches the mission control aesthetic.
     Appears only when content overflows. Browsers that natively auto-hide
     overlay scrollbars (iOS Safari, macOS) keep doing so on top of this. */
  .scroll-thin {
    scrollbar-width: thin;                                /* Firefox */
    scrollbar-color: rgba(0, 229, 255, 0.32) transparent; /* Firefox: thumb track */
  }
  .scroll-thin::-webkit-scrollbar {
    width: 5px;
    height: 5px;
  }
  .scroll-thin::-webkit-scrollbar-track {
    background: transparent;
  }
  .scroll-thin::-webkit-scrollbar-thumb {
    background-color: rgba(0, 229, 255, 0.30);
    border-radius: 99px;
    transition: background-color 200ms ease;
  }
  .scroll-thin:hover::-webkit-scrollbar-thumb,
  .scroll-thin:focus-within::-webkit-scrollbar-thumb {
    background-color: rgba(0, 229, 255, 0.55);
  }
  .scroll-thin::-webkit-scrollbar-thumb:active {
    background-color: rgba(0, 229, 255, 0.75);
  }
  .scroll-thin::-webkit-scrollbar-corner {
    background: transparent;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ─────────────────────────────────────────────────────────────
// Design tokens
// ─────────────────────────────────────────────────────────────
const T = {
  bg: '#05070C',
  bgSoft: '#0B1018',
  surface: 'rgba(255,255,255,0.04)',
  surface2: 'rgba(255,255,255,0.07)',
  hairline: 'rgba(140,200,255,0.14)',
  hairlineSoft: 'rgba(140,200,255,0.08)',
  text: 'rgba(255,255,255,0.96)',
  text2: 'rgba(255,255,255,0.62)',
  text3: 'rgba(255,255,255,0.38)',
  cyan: '#00E5FF',
  blue: '#3D7FFF',
  purple: '#A876FF',
  teal: '#4FE3C1',
  warn: '#FFB347',
  display: '"Space Grotesk", -apple-system, system-ui, sans-serif',
  mono: '"JetBrains Mono", ui-monospace, "SF Mono", monospace',
};

// ─────────────────────────────────────────────────────────────
// Atomic components
// ─────────────────────────────────────────────────────────────
function Eyebrow({ children, color = T.cyan, style }) {
  return (
    <div style={{
      fontFamily: T.mono, fontSize: 10.5, letterSpacing: '0.22em',
      textTransform: 'uppercase', color,
      display: 'inline-flex', alignItems: 'center', gap: 8,
      ...style,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 99, background: color, boxShadow: `0 0 10px ${color}` }} />
      {children}
    </div>
  );
}

function Telemetry({ time, code = 'MC-04', state = 'IDLE' }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      fontFamily: T.mono, fontSize: 10, letterSpacing: '0.18em',
      color: T.text3, padding: '0 24px',
    }}>
      <span>{code} · {state}</span>
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
        <span style={{ width: 5, height: 5, borderRadius: 99, background: T.teal, boxShadow: `0 0 8px ${T.teal}`, animation: 'pulse 1.6s ease-in-out infinite' }} />
        {time}
      </span>
    </div>
  );
}

function GlowButton({ children, onClick, variant = 'primary', disabled, style }) {
  const isPrimary = variant === 'primary';
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width: '100%', height: 60, borderRadius: 18,
      border: isPrimary ? '1px solid rgba(0,229,255,0.5)' : `1px solid ${T.hairline}`,
      background: isPrimary
        ? 'linear-gradient(180deg, rgba(0,229,255,0.18) 0%, rgba(61,127,255,0.16) 100%)'
        : 'rgba(255,255,255,0.04)',
      color: T.text,
      fontFamily: T.display, fontSize: 16, fontWeight: 600, letterSpacing: '0.04em',
      textTransform: 'uppercase',
      cursor: disabled ? 'not-allowed' : 'pointer',
      opacity: disabled ? 0.4 : 1,
      position: 'relative', overflow: 'hidden',
      boxShadow: isPrimary
        ? '0 0 0 1px rgba(0,229,255,0.15) inset, 0 8px 30px rgba(0,229,255,0.25), 0 0 60px rgba(61,127,255,0.18)'
        : '0 1px 0 rgba(255,255,255,0.05) inset',
      transition: 'transform 120ms ease, box-shadow 200ms ease',
      WebkitTapHighlightColor: 'transparent',
      ...style,
    }}
    onTouchStart={e => e.currentTarget.style.transform = 'scale(0.985)'}
    onTouchEnd={e => e.currentTarget.style.transform = 'scale(1)'}
    onMouseDown={e => e.currentTarget.style.transform = 'scale(0.985)'}
    onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
    onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
      {isPrimary && <span style={{
        position: 'absolute', inset: 0,
        background: 'radial-gradient(ellipse at 50% 120%, rgba(0,229,255,0.5) 0%, transparent 60%)',
        opacity: 0.6, pointerEvents: 'none',
      }} />}
      <span style={{ position: 'relative', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 10, width: '100%' }}>
        {children}
      </span>
    </button>
  );
}

// ─────────────────────────────────────────────────────────────
// Drop indicator shown between checklist items during drag-to-reorder
// ─────────────────────────────────────────────────────────────
function DropIndicator() {
  return (
    <div style={{
      height: 3, marginLeft: 4, marginRight: 4,
      borderRadius: 99,
      background: `linear-gradient(90deg, transparent, ${T.cyan}, transparent)`,
      boxShadow: `0 0 14px ${T.cyan}, 0 0 6px ${T.cyan}`,
      flexShrink: 0,
      animation: 'pulse 1.2s ease-in-out infinite',
    }} />
  );
}

// ─────────────────────────────────────────────────────────────
// Edit-item overlay — modal/sheet for editing an existing checklist
// item's text. Auto-expanding textarea (matches Claude's input pattern),
// caps at 280px then scrolls. Tap-outside, Esc, or Cancel dismisses.
// ─────────────────────────────────────────────────────────────
function EditItemOverlay({ item, saving, onCancel, onSave }) {
  const [text, setText] = useState(item?.text || '');
  const taRef = useRef(null);

  // Auto-resize the textarea like the rest of the app's auto-resize inputs.
  const autoResize = (el) => {
    if (!el) return;
    el.style.height = 'auto';
    const MAX = 280;
    el.style.height = Math.min(el.scrollHeight, MAX) + 'px';
    el.style.overflowY = el.scrollHeight > MAX ? 'auto' : 'hidden';
  };

  // Resync when the editing target changes.
  useEffect(() => { setText(item?.text || ''); }, [item?.id]);

  // Auto-resize on text change.
  useEffect(() => { autoResize(taRef.current); }, [text]);

  // Focus the textarea, place caret at end on mount.
  useEffect(() => {
    const ta = taRef.current;
    if (!ta) return;
    const t = setTimeout(() => {
      ta.focus();
      const len = ta.value.length;
      try { ta.setSelectionRange(len, len); } catch {}
      autoResize(ta);
    }, 40);
    return () => clearTimeout(t);
  }, []);

  // Esc to cancel.
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [onCancel]);

  if (!item) return null;

  const canSave = text.trim().length > 0 && !saving;

  return (
    <div
      onClick={onCancel}
      style={{
        position: 'fixed', inset: 0, zIndex: 200,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: '20px 16px',
        background: 'rgba(2,4,8,0.66)',
        backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)',
        animation: 'backdropIn 220ms ease',
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: '100%', maxWidth: 380,
          background: 'linear-gradient(160deg, rgba(168,118,255,0.12), rgba(255,255,255,0.025) 55%, rgba(168,118,255,0.04))',
          border: `1px solid rgba(168,118,255,0.5)`,
          borderRadius: 22,
          padding: '18px 16px 14px',
          boxShadow: `
            0 0 0 1px rgba(255,255,255,0.05) inset,
            0 30px 80px rgba(0,0,0,0.6),
            0 0 60px rgba(168,118,255,0.20)
          `,
          backdropFilter: 'blur(28px)', WebkitBackdropFilter: 'blur(28px)',
          animation: 'modalIn 280ms cubic-bezier(0.2,0.8,0.2,1)',
          position: 'relative',
        }}
      >
        {/* Eyebrow */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
          <span style={{
            width: 6, height: 6, borderRadius: 99, background: T.purple,
            boxShadow: `0 0 8px ${T.purple}`,
          }} />
          <span style={{
            fontFamily: T.mono, fontSize: 10, letterSpacing: '0.24em',
            color: T.purple, textTransform: 'uppercase', fontWeight: 600,
            textShadow: `0 0 8px ${T.purple}66`,
          }}>
            Edit Item
          </span>
        </div>

        {/* Auto-expanding textarea */}
        <textarea
          ref={taRef}
          className="scroll-thin"
          value={text}
          onChange={(e) => setText(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === 'Enter' && !e.shiftKey && text.trim()) {
              e.preventDefault();
              onSave(text);
            }
          }}
          placeholder="Edit item text…"
          rows={1}
          enterKeyHint="done"
          style={{
            all: 'unset',
            display: 'block', boxSizing: 'border-box',
            width: '100%',
            fontFamily: T.display, fontSize: 16, fontWeight: 500,
            color: T.text, letterSpacing: '-0.005em',
            lineHeight: 1.45,
            padding: '12px 14px',
            minHeight: 48, maxHeight: 280,
            resize: 'none',
            whiteSpace: 'pre-wrap', wordBreak: 'break-word',
            background: 'rgba(255,255,255,0.04)',
            border: `1px solid rgba(168,118,255,0.4)`,
            borderRadius: 14,
            overflowY: 'hidden',
            boxShadow: '0 0 0 3px rgba(168,118,255,0.08), inset 0 1px 0 rgba(255,255,255,0.04)',
            marginBottom: 12,
          }}
        />

        {/* Buttons */}
        <div style={{ display: 'flex', gap: 10 }}>
          <button
            onClick={onCancel}
            style={{
              flex: 1, height: 50, borderRadius: 14,
              background: T.surface,
              border: `1px solid ${T.hairline}`,
              color: T.text2,
              fontFamily: T.display, fontSize: 13, fontWeight: 600,
              letterSpacing: '0.04em', textTransform: 'uppercase',
              cursor: 'pointer',
              boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.04)',
              WebkitTapHighlightColor: 'transparent',
              all: 'unset',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            }}
          >
            Cancel
          </button>
          <button
            onClick={() => canSave && onSave(text)}
            disabled={!canSave}
            style={{
              all: 'unset',
              flex: 1, height: 50, borderRadius: 14,
              background: canSave
                ? `linear-gradient(180deg, rgba(0,229,255,0.22), rgba(61,127,255,0.14))`
                : 'rgba(255,255,255,0.04)',
              border: `1px solid ${canSave ? 'rgba(0,229,255,0.55)' : T.hairlineSoft}`,
              color: canSave ? T.text : T.text3,
              fontFamily: T.display, fontSize: 13, fontWeight: 600,
              letterSpacing: '0.04em', textTransform: 'uppercase',
              cursor: canSave ? 'pointer' : 'not-allowed',
              boxShadow: canSave
                ? `0 0 20px rgba(0,229,255,0.22), inset 0 1px 0 rgba(255,255,255,0.05)`
                : 'inset 0 1px 0 rgba(255,255,255,0.04)',
              opacity: saving ? 0.7 : 1,
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              WebkitTapHighlightColor: 'transparent',
            }}
          >
            {saving ? (
              <>
                <svg width="12" height="12" viewBox="0 0 12 12" style={{ animation: 'spin360 800ms linear infinite' }}>
                  <path d="M10 6a4 4 0 1 1-1.2-2.85M10 1.5V4H7.5" stroke="currentColor" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                Saving…
              </>
            ) : (
              <>
                Save
                <svg width="12" height="12" viewBox="0 0 12 12">
                  <path d="M2 6l3 3 5-6" stroke="currentColor" strokeWidth="1.7" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </>
            )}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Screen 1 — Mission Input
// ─────────────────────────────────────────────────────────────
function MissionInput({ onLaunch, mission, setMission }) {
  // Cloud-backed mission queue (Upstash Redis via /api/queue).
  const [items, setItems] = useState([]);
  const [itemsLoading, setItemsLoading] = useState(true);
  const [itemsError, setItemsError] = useState(null);
  const [savingItem, setSavingItem] = useState(false);
  const [addingItem, setAddingItem] = useState(false);
  const [newItemDraft, setNewItemDraft] = useState('');
  const newItemInputRef = useRef(null);

  // Drag-to-reorder state
  const [drag, setDrag] = useState(null);
  // drag = null | { id, fromIdx, startY, deltaY, dropIdx, startScrollTop }
  const itemRefs = useRef({});

  // Refs used by the auto-scroll-on-edge logic.
  const listScrollRef = useRef(null);
  const lastPointerYRef = useRef(0);
  const autoScrollRef = useRef({ rafId: null });
  const dragRef = useRef(null);
  const itemsRef = useRef([]);

  // Drag refs: pressed-item snapshot + suppression flag so a click after a
  // drop doesn't fall through to the row's tap handler.
  const pressTimerRef = useRef(null); // kept for cleanup compatibility
  const pressedItemRef = useRef(null);
  const justEndedDragRef = useRef(false);

  // Tap-to-action-menu state. selectedItemId: which row's action menu shows.
  // editingItemId: which row's text is currently being edited inline in the
  // mission input. Both flow through the bottom CTA region.
  const [selectedItemId, setSelectedItemId] = useState(null);
  const [editingItemId, setEditingItemId] = useState(null);

  useEffect(() => { dragRef.current = drag; }, [drag]);
  useEffect(() => { itemsRef.current = items; }, [items]);

  // Cancel any in-flight auto-scroll frame and lingering press timer on unmount.
  useEffect(() => () => {
    if (autoScrollRef.current.rafId) {
      cancelAnimationFrame(autoScrollRef.current.rafId);
      autoScrollRef.current.rafId = null;
    }
    if (pressTimerRef.current) clearTimeout(pressTimerRef.current);
  }, []);

  // Shake-to-undo / Undo-toast state. pendingUndo holds the most recently
  // deleted item; cleared after 10s or on the next delete.
  const [pendingUndo, setPendingUndo] = useState(null);
  const undoTimeoutRef = useRef(null);
  const lastShakeRef = useRef(0);
  const [motionPermission, setMotionPermission] = useState(() => {
    if (typeof window === 'undefined' || typeof window.DeviceMotionEvent === 'undefined') {
      return 'unsupported';
    }
    if (typeof DeviceMotionEvent.requestPermission === 'function') return 'default';
    return 'granted'; // browsers without the permission API expose events freely
  });

  useEffect(() => () => {
    if (undoTimeoutRef.current) clearTimeout(undoTimeoutRef.current);
  }, []);

  // Newly-appended items pulse green for ~1s and the list auto-scrolls to them.
  // Map of id → animation-delay (ms). Allows a subtle stagger across batch adds.
  const [highlightedIds, setHighlightedIds] = useState(() => new Map());
  const [scrollToId, setScrollToId] = useState(null);

  // Tag a batch of just-added items with the green pulse, scroll to the first,
  // then drop the tags after the slowest animation finishes.
  const highlightAddedItems = (added) => {
    if (!Array.isArray(added) || added.length === 0) return;
    const STAGGER_MS = 80;
    const ids = added.map(a => a.id);
    setHighlightedIds(prev => {
      const next = new Map(prev);
      added.forEach((item, i) => next.set(item.id, i * STAGGER_MS));
      return next;
    });
    setScrollToId(added[0].id);
    const totalMs = 1000 + (added.length - 1) * STAGGER_MS + 120;
    setTimeout(() => {
      setHighlightedIds(prev => {
        const next = new Map(prev);
        ids.forEach(id => next.delete(id));
        return next;
      });
    }, totalMs);
  };

  useEffect(() => {
    if (!scrollToId) return;
    const node = itemRefs.current[scrollToId];
    if (node) node.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    setScrollToId(null);
  }, [scrollToId, items]);

  // Threshold for routing pasted text through the Claude task-parser instead
  // of treating it as a single item. Still used by the queue's Add Item flow.
  const CHECKLIST_THRESHOLD = 80;

  const canCallAPI = typeof window !== 'undefined'
    && /^https?:$/.test(window.location?.protocol || '');

  const fetchItems = async () => {
    if (!canCallAPI) {
      setItemsLoading(false);
      return;
    }
    setItemsError(null);
    try {
      const res = await fetch('/api/queue', { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Failed (${res.status})`);
      setItems(Array.isArray(data.items) ? data.items : []);
    } catch (err) {
      setItemsError(err.message || 'Could not load queue');
    } finally {
      setItemsLoading(false);
    }
  };

  // Load on mount.
  useEffect(() => { fetchItems(); }, []);

  // Refetch when the tab becomes visible again — keeps devices roughly in sync
  // without needing real-time websockets.
  useEffect(() => {
    if (typeof document === 'undefined') return;
    const handler = () => { if (document.visibilityState === 'visible') fetchItems(); };
    document.addEventListener('visibilitychange', handler);
    return () => document.removeEventListener('visibilitychange', handler);
  }, []);

  useEffect(() => {
    if (addingItem) {
      const t = setTimeout(() => newItemInputRef.current?.focus(), 0);
      return () => clearTimeout(t);
    }
  }, [addingItem]);

  const autoResizeTextarea = (el) => {
    if (!el) return;
    el.style.height = 'auto';
    const next = Math.min(el.scrollHeight, 240);
    el.style.height = next + 'px';
    el.style.overflowY = el.scrollHeight > 240 ? 'auto' : 'hidden';
  };

  // Auto-resize on the queue's inline Add-Item textarea.
  useEffect(() => {
    if (newItemInputRef.current) autoResizeTextarea(newItemInputRef.current);
  }, [newItemDraft, addingItem]);

  // Shared: parse a block (or accept single line) and add to the cloud queue.
  // Returns the added items array on success, or null on failure.
  // `append: true` puts the new items at the bottom; default prepends to top.
  const submitTextAsTasks = async (text, { append = false } = {}) => {
    if (savingItem) return null;
    if (!canCallAPI) {
      setItemsError('Adding requires the deployed app (cloud sync)');
      return null;
    }
    const trimmed = text.trim();
    if (!trimmed) return null;

    setSavingItem(true);
    setItemsError(null);
    try {
      let texts = [trimmed];

      // Multi-line OR long block → ask Claude to split + rewrite.
      if (trimmed.includes('\n') || trimmed.length > CHECKLIST_THRESHOLD) {
        const parseRes = await fetch('/api/parse-tasks', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ text: trimmed }),
        });
        const parseData = await parseRes.json().catch(() => ({}));
        if (!parseRes.ok) throw new Error(parseData.error || `Parse failed (${parseRes.status})`);
        const tasks = Array.isArray(parseData.tasks) ? parseData.tasks : [];
        if (tasks.length === 0) throw new Error('No tasks parsed from that text');
        texts = tasks;
      }

      const url = append ? '/api/queue?append=1' : '/api/queue';
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(texts.length === 1 ? { text: texts[0] } : { texts }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Failed (${res.status})`);
      setItems(Array.isArray(data.items) ? data.items : []);
      return Array.isArray(data.added) ? data.added : [];
    } catch (err) {
      setItemsError(err.message || 'Could not save');
      return null;
    } finally {
      setSavingItem(false);
    }
  };

  // Inline queue "Add Item" flow — prepends to the top, no green pulse.
  const handleAddItem = async () => {
    const text = newItemDraft.trim();
    if (!text) {
      setAddingItem(false);
      setNewItemDraft('');
      return;
    }
    const added = await submitTextAsTasks(text);
    if (added !== null) setNewItemDraft('');
    // Stay open for fast repeated entry; empty Enter will dismiss.
  };

  const handleDeleteItem = async (id) => {
    // FIRST — request DeviceMotion permission synchronously inside the user
    // gesture (iOS 13+ requirement). Anything async after this would lose
    // the user-activation flag.
    if (motionPermission === 'default'
        && typeof window.DeviceMotionEvent !== 'undefined'
        && typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission()
        .then(result => setMotionPermission(result === 'granted' ? 'granted' : 'denied'))
        .catch(() => setMotionPermission('denied'));
    }

    if (!canCallAPI) {
      setItemsError('Deleting requires the deployed app (cloud sync)');
      return;
    }

    const idx = items.findIndex(item => item.id === id);
    const itemToDelete = items.find(item => item.id === id);
    if (idx === -1 || !itemToDelete) return;

    // Save undo snapshot — overwrites any previous, restarts the 10s timer.
    if (undoTimeoutRef.current) clearTimeout(undoTimeoutRef.current);
    setPendingUndo({ item: itemToDelete, originalIndex: idx, deletedAt: Date.now() });
    undoTimeoutRef.current = setTimeout(() => {
      setPendingUndo(null);
      undoTimeoutRef.current = null;
    }, 10000);

    // Optimistic update — snap it out of the list immediately.
    const before = items;
    setItems(prev => prev.filter(item => item.id !== id));
    try {
      const res = await fetch(`/api/queue?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Failed (${res.status})`);
      if (Array.isArray(data.items)) setItems(data.items);
    } catch (err) {
      setItems(before); // rollback
      setPendingUndo(null);
      if (undoTimeoutRef.current) {
        clearTimeout(undoTimeoutRef.current);
        undoTimeoutRef.current = null;
      }
      setItemsError(err.message || 'Could not delete item');
    }
  };

  const handleUndoDelete = async () => {
    if (!pendingUndo) return;
    const { item, originalIndex } = pendingUndo;

    if (undoTimeoutRef.current) {
      clearTimeout(undoTimeoutRef.current);
      undoTimeoutRef.current = null;
    }
    setPendingUndo(null);

    // Insert at original position (clamped to current length so subsequent
    // deletes/adds during the undo window don't blow up the splice).
    const targetIndex = Math.min(originalIndex, items.length);
    const restored = [...items];
    restored.splice(targetIndex, 0, item);

    // Optimistic update + green-pulse highlight + auto-scroll
    const before = items;
    setItems(restored);
    highlightAddedItems([item]);

    if (!canCallAPI) return;
    try {
      const res = await fetch('/api/queue', {
        method: 'PUT',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ items: restored }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Failed (${res.status})`);
      if (Array.isArray(data.items)) setItems(data.items);
    } catch (err) {
      setItems(before);
      setItemsError(err.message || 'Could not restore item');
    }
  };

  // Shake-to-undo — only listens while there's a pending undo and the
  // device-motion permission was granted.
  useEffect(() => {
    if (motionPermission !== 'granted' || !pendingUndo) return;

    const SHAKE_THRESHOLD = 15;     // m/s² of true acceleration (no gravity)
    const SHAKE_DEBOUNCE_MS = 1500; // gap between accepted shakes

    const handler = (e) => {
      let mag;
      if (e.acceleration && e.acceleration.x !== null) {
        const a = e.acceleration;
        mag = Math.sqrt((a.x || 0) ** 2 + (a.y || 0) ** 2 + (a.z || 0) ** 2);
      } else if (e.accelerationIncludingGravity) {
        const a = e.accelerationIncludingGravity;
        const total = Math.sqrt((a.x || 0) ** 2 + (a.y || 0) ** 2 + (a.z || 0) ** 2);
        mag = Math.abs(total - 9.8); // strip approximate gravity baseline
      } else { return; }

      if (mag > SHAKE_THRESHOLD) {
        const now = Date.now();
        if (now - lastShakeRef.current > SHAKE_DEBOUNCE_MS) {
          lastShakeRef.current = now;
          handleUndoDelete();
        }
      }
    };

    window.addEventListener('devicemotion', handler);
    return () => window.removeEventListener('devicemotion', handler);
  }, [motionPermission, pendingUndo]);

  // `source` (optional): { id, index } of the queue item this launch came from.
  // null/undefined for launches via the freeform input.
  const handleLaunchItem = (text, source) => {
    if (drag) return; // ignore taps mid-drag
    setSelectedItemId(null);
    setEditingItemId(null);
    setMission(text);
    onLaunch(text, source || null);
  };

  // Tap on a row toggles the action menu for that item.
  const handleRowTap = (item) => {
    if (justEndedDragRef.current) return;
    if (editingItemId) return; // ignore row taps mid-edit
    setSelectedItemId(prev => prev === item.id ? null : item.id);
  };

  // Action menu: Edit Item
  // Action menu: Edit Item → opens the overlay
  const handleStartEdit = () => {
    const item = items.find(i => i.id === selectedItemId);
    if (!item) return;
    setEditingItemId(item.id);
    setSelectedItemId(null);
    // No mission/input state to touch — the overlay manages its own text.
  };

  // Action menu: Launch (selected item)
  const handleSelectedLaunch = () => {
    const idx = items.findIndex(i => i.id === selectedItemId);
    const item = items[idx];
    if (!item) return;
    handleLaunchItem(item.text, { id: item.id, index: idx });
  };

  // Edit overlay: Cancel
  const handleCancelEdit = () => {
    setEditingItemId(null);
  };

  // Edit overlay: Save (overlay passes the new text)
  const handleSaveEdit = async (newText) => {
    const text = (newText || '').trim();
    const id = editingItemId;
    if (!text || !id) return;

    setSavingItem(true);
    const updated = items.map(i => i.id === id ? { ...i, text } : i);
    setItems(updated);
    setEditingItemId(null);

    if (!canCallAPI) { setSavingItem(false); return; }
    try {
      const res = await fetch('/api/queue', {
        method: 'PUT',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ items: updated }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Failed (${res.status})`);
      if (Array.isArray(data.items)) setItems(data.items);
    } catch (err) {
      setItemsError(err.message || 'Could not save edit');
    } finally {
      setSavingItem(false);
    }
  };

  // Clear stale selection / edit state if the underlying item disappears
  // (deleted locally, removed by a cross-device sync, etc.).
  useEffect(() => {
    if (selectedItemId && !items.some(i => i.id === selectedItemId)) {
      setSelectedItemId(null);
    }
    if (editingItemId && !items.some(i => i.id === editingItemId)) {
      setEditingItemId(null);
      setMission('');
    }
  }, [items, selectedItemId, editingItemId]);

  // Esc dismisses the action menu / cancels edit.
  useEffect(() => {
    if (!selectedItemId && !editingItemId) return;
    const handler = (e) => {
      if (e.key === 'Escape') {
        if (editingItemId) handleCancelEdit();
        else setSelectedItemId(null);
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [selectedItemId, editingItemId]);

  const handleLazyLaunch = () => {
    if (items.length === 0 || drag) return;
    const first = items[0];
    handleLaunchItem(first.text, { id: first.id, index: 0 });
  };

  const reorderItems = async (newOrder) => {
    const prev = items;
    setItems(newOrder);          // optimistic
    setItemsError(null);
    if (!canCallAPI) return;
    try {
      const res = await fetch('/api/queue', {
        method: 'PUT',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ items: newOrder }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Failed (${res.status})`);
      if (Array.isArray(data.items)) setItems(data.items);
    } catch (err) {
      setItems(prev);              // rollback
      setItemsError(err.message || 'Could not save order');
    }
  };

  // ── Drag + auto-scroll-on-edge helpers ────────────────────────────────
  const AUTOSCROLL_TRIGGER = 60;   // px from top/bottom of container
  const AUTOSCROLL_MAX_SPEED = 14; // px per frame at the edge

  const stopAutoScroll = () => {
    if (autoScrollRef.current.rafId) {
      cancelAnimationFrame(autoScrollRef.current.rafId);
      autoScrollRef.current.rafId = null;
    }
  };

  // Recomputes deltaY (pointer + scroll offset) and dropIdx for the current
  // pointer Y. Called both from pointermove and from the auto-scroll frame.
  const updateDragVisuals = (clientY) => {
    const dragNow = dragRef.current;
    if (!dragNow) return;
    const itemsNow = itemsRef.current;

    const currentScrollTop = listScrollRef.current?.scrollTop || 0;
    const scrollDelta = currentScrollTop - (dragNow.startScrollTop || 0);
    // Add scrollDelta so the dragged tile stays under the finger even when
    // the container scrolls beneath it.
    const deltaY = (clientY - dragNow.startY) + scrollDelta;

    const others = itemsNow.filter(i => i.id !== dragNow.id);
    let dropIdx = others.length;
    for (let i = 0; i < others.length; i++) {
      const node = itemRefs.current[others[i].id];
      if (!node) continue;
      const rect = node.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      if (clientY < midY) { dropIdx = i; break; }
    }

    if (dragNow.deltaY !== deltaY || dragNow.dropIdx !== dropIdx) {
      setDrag(d => d ? { ...d, deltaY, dropIdx } : d);
    }
  };

  const autoScrollFrame = () => {
    autoScrollRef.current.rafId = null;
    const dragNow = dragRef.current;
    const container = listScrollRef.current;
    if (!dragNow || !container) return;

    const rect = container.getBoundingClientRect();
    const y = lastPointerYRef.current;
    let speed = 0;
    if (y < rect.top + AUTOSCROLL_TRIGGER) {
      const ratio = Math.max(0, Math.min(1, (rect.top + AUTOSCROLL_TRIGGER - y) / AUTOSCROLL_TRIGGER));
      speed = -Math.ceil(AUTOSCROLL_MAX_SPEED * ratio);
    } else if (y > rect.bottom - AUTOSCROLL_TRIGGER) {
      const ratio = Math.max(0, Math.min(1, (y - (rect.bottom - AUTOSCROLL_TRIGGER)) / AUTOSCROLL_TRIGGER));
      speed = Math.ceil(AUTOSCROLL_MAX_SPEED * ratio);
    }
    if (speed === 0) return;

    const maxScroll = container.scrollHeight - container.clientHeight;
    const newScrollTop = Math.max(0, Math.min(maxScroll, container.scrollTop + speed));
    if (newScrollTop === container.scrollTop) return; // hit edge — bail

    container.scrollTop = newScrollTop;
    updateDragVisuals(y);
    autoScrollRef.current.rafId = requestAnimationFrame(autoScrollFrame);
  };

  const maybeStartAutoScroll = (clientY) => {
    const container = listScrollRef.current;
    if (!container) return;
    const rect = container.getBoundingClientRect();
    const inZone =
      clientY < rect.top + AUTOSCROLL_TRIGGER ||
      clientY > rect.bottom - AUTOSCROLL_TRIGGER;
    if (inZone) {
      if (!autoScrollRef.current.rafId) {
        autoScrollRef.current.rafId = requestAnimationFrame(autoScrollFrame);
      }
    } else {
      stopAutoScroll();
    }
  };

  const handleDragStart = (e, item, idx) => {
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    const startScrollTop = listScrollRef.current?.scrollTop || 0;
    lastPointerYRef.current = e.clientY;
    setDrag({
      id: item.id,
      fromIdx: idx,
      startY: e.clientY,
      deltaY: 0,
      dropIdx: idx,
      startScrollTop,
    });
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch {}
  };

  const handleDragMove = (e) => {
    if (!dragRef.current) return;
    e.preventDefault();
    lastPointerYRef.current = e.clientY;
    updateDragVisuals(e.clientY);
    maybeStartAutoScroll(e.clientY);
  };

  const handleDragEnd = () => {
    stopAutoScroll();
    const dragNow = dragRef.current;
    if (!dragNow) return;
    const { fromIdx, dropIdx } = dragNow;
    setDrag(null);
    // Suppress the click event that fires after pointerup on the same target,
    // so dropping doesn't accidentally launch the dropped item.
    justEndedDragRef.current = true;
    setTimeout(() => { justEndedDragRef.current = false; }, 120);
    if (fromIdx === dropIdx) return;
    const reordered = [...items];
    const [moved] = reordered.splice(fromIdx, 1);
    reordered.splice(dropIdx, 0, moved);
    reorderItems(reordered);
  };

  // ── Row-level instant drag (entire row is the drag target) ─────────────
  // No long-press; any movement past DRAG_MOVE_THRESHOLD activates drag.
  const DRAG_MOVE_THRESHOLD = 5;

  const activateDrag = (pressed) => {
    const startScrollTop = listScrollRef.current?.scrollTop || 0;
    lastPointerYRef.current = pressed.startY;
    setDrag({
      id: pressed.id,
      fromIdx: pressed.idx,
      startY: pressed.startY,
      deltaY: 0,
      dropIdx: pressed.idx,
      startScrollTop,
    });
    try { pressed.target.setPointerCapture(pressed.pointerId); } catch {}
    if (typeof navigator !== 'undefined' && navigator.vibrate) {
      try { navigator.vibrate(8); } catch {}
    }
  };

  const handleRowPointerDown = (e, item, idx) => {
    if (e.button !== undefined && e.button !== 0) return;
    if (dragRef.current) return;
    pressedItemRef.current = {
      id: item.id, idx,
      startX: e.clientX, startY: e.clientY,
      pointerId: e.pointerId,
      target: e.currentTarget,
    };
  };

  const handleRowPointerMove = (e) => {
    if (dragRef.current) {
      handleDragMove(e);
      return;
    }
    const pressed = pressedItemRef.current;
    if (!pressed) return;
    const dx = e.clientX - pressed.startX;
    const dy = e.clientY - pressed.startY;
    if (dx * dx + dy * dy > DRAG_MOVE_THRESHOLD * DRAG_MOVE_THRESHOLD) {
      activateDrag(pressed);
      pressedItemRef.current = null;
    }
  };

  const handleRowPointerUp = () => {
    if (dragRef.current) {
      handleDragEnd();
      return;
    }
    pressedItemRef.current = null;
    // Click event fires next; tap → action menu is handled by onClick.
  };

  const handleRowPointerCancel = () => {
    pressedItemRef.current = null;
    if (dragRef.current) handleDragEnd();
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '0 0 24px', minHeight: 0 }}>
      <div style={{ paddingTop: 8 }}>
        <Telemetry time="04:32:11 UTC" code="MC-04 / READY" state="STANDBY" />
      </div>

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '20px 24px 0', minHeight: 0 }}>
        <Eyebrow style={{ marginBottom: 14 }}>Pre-flight</Eyebrow>
        <h1 style={{
          fontFamily: T.display, fontWeight: 600, fontSize: 36, lineHeight: 1.05,
          letterSpacing: '-0.02em', color: T.text, margin: 0,
          marginBottom: 20,
        }}>
          What mission<br/>are we launching?
        </h1>

        <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 }}>
          {items.length > 0 && (
            <button
              onClick={handleLazyLaunch}
              disabled={!!drag}
              style={{
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
                width: '100%',
                padding: '14px 16px',
                background: `linear-gradient(180deg, rgba(0,229,255,0.20), rgba(79,227,193,0.12))`,
                border: `1px solid rgba(0,229,255,0.5)`,
                borderRadius: 14,
                fontFamily: T.display, fontSize: 14, fontWeight: 600,
                color: T.text,
                letterSpacing: '0.04em', textTransform: 'uppercase',
                cursor: drag ? 'default' : 'pointer',
                transition: 'all 200ms ease',
                WebkitTapHighlightColor: 'transparent',
                WebkitAppearance: 'none', appearance: 'none',
                marginBottom: 8, flexShrink: 0,
                boxShadow: `0 0 0 1px rgba(0,229,255,0.15) inset, 0 4px 24px rgba(0,229,255,0.18)`,
              }}
              onTouchStart={e => e.currentTarget.style.transform = 'scale(0.985)'}
              onTouchEnd={e => e.currentTarget.style.transform = 'scale(1)'}
              onMouseDown={e => e.currentTarget.style.transform = 'scale(0.985)'}
              onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
              onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
            >
              <svg width="14" height="14" viewBox="0 0 14 14" style={{ color: T.cyan, filter: `drop-shadow(0 0 6px ${T.cyan})` }}>
                <path d="M7 1l-3 7h3l-2 5L11 6H8l2-5z" fill="currentColor"/>
              </svg>
              I'm Lazy, Help Me
            </button>
          )}

          {addingItem ? (
            <div style={{
              display: 'flex', alignItems: 'flex-end', gap: 6,
              background: 'rgba(255,255,255,0.04)',
              border: `1px solid rgba(0,229,255,0.42)`,
              borderRadius: 14, padding: '8px 8px 8px 14px',
              boxShadow: '0 0 0 3px rgba(0,229,255,0.08), 0 0 24px rgba(0,229,255,0.10)',
              marginBottom: 8, flexShrink: 0,
              transition: 'border-color 200ms ease, box-shadow 200ms ease',
            }}>
              <textarea
                ref={newItemInputRef}
                className="scroll-thin"
                value={newItemDraft}
                onChange={e => {
                  setNewItemDraft(e.target.value);
                  autoResizeTextarea(e.target);
                }}
                onKeyDown={e => {
                  if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleAddItem();
                  } else if (e.key === 'Escape') {
                    setAddingItem(false);
                    setNewItemDraft('');
                  }
                }}
                placeholder="Type or paste one or more tasks. Shift+Enter for newline."
                rows={1}
                style={{
                  all: 'unset',
                  display: 'block', boxSizing: 'border-box',
                  flex: 1, minWidth: 0, width: '100%',
                  fontFamily: T.display, fontSize: 14, color: T.text,
                  lineHeight: 1.45, padding: '6px 0',
                  minHeight: 22, maxHeight: 240,
                  resize: 'none',
                  whiteSpace: 'pre-wrap', wordBreak: 'break-word',
                  overflowY: 'hidden',
                }}
              />
              <button
                onClick={handleAddItem}
                disabled={!newItemDraft.trim() || savingItem}
                aria-label={savingItem ? 'Saving' : 'Save'}
                style={{
                  all: 'unset', flexShrink: 0,
                  cursor: (newItemDraft.trim() && !savingItem) ? 'pointer' : 'default',
                  width: 30, height: 30, borderRadius: 99,
                  background: newItemDraft.trim()
                    ? `linear-gradient(180deg, ${T.cyan}, ${T.blue})`
                    : 'rgba(255,255,255,0.05)',
                  color: newItemDraft.trim() ? '#001018' : T.text3,
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                  boxShadow: newItemDraft.trim() ? `0 0 12px ${T.cyan}88` : 'none',
                  transition: 'all 200ms ease',
                  opacity: savingItem ? 0.7 : 1,
                }}
              >
                {savingItem ? (
                  <svg width="12" height="12" viewBox="0 0 12 12" style={{ animation: 'spin360 800ms linear infinite' }}>
                    <path d="M10 6a4 4 0 1 1-1.2-2.85M10 1.5V4H7.5" stroke="currentColor" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                ) : (
                  <svg width="13" height="13" viewBox="0 0 13 13">
                    <path d="M2 6.5l3 3 6-7" stroke="currentColor" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                )}
              </button>
              <button
                onClick={() => { setAddingItem(false); setNewItemDraft(''); }}
                aria-label="Cancel"
                style={{
                  all: 'unset', cursor: 'pointer', flexShrink: 0,
                  width: 30, height: 30, borderRadius: 99,
                  background: 'rgba(255,255,255,0.04)',
                  border: `1px solid ${T.hairlineSoft}`,
                  color: T.text2,
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                }}
              >
                <svg width="9" height="9" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>
              </button>
            </div>
          ) : (
            <button
              onClick={() => setAddingItem(true)}
              style={{
                display: 'flex', alignItems: 'center', gap: 10,
                background: 'rgba(168,118,255,0.08)',
                border: `1px solid rgba(168,118,255,0.32)`,
                borderRadius: 14, padding: '12px 14px',
                fontFamily: T.display, fontSize: 14, fontWeight: 500,
                color: T.purple,
                cursor: 'pointer', textAlign: 'left',
                transition: 'all 150ms',
                WebkitAppearance: 'none', appearance: 'none',
                WebkitTapHighlightColor: 'transparent',
                marginBottom: 8, flexShrink: 0,
                letterSpacing: '0.02em',
              }}
            >
              <svg width="14" height="14" viewBox="0 0 14 14">
                <path d="M7 1.5v11M1.5 7h11" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
              </svg>
              Add Item
            </button>
          )}

          {itemsError && (
            <div style={{
              fontFamily: T.mono, fontSize: 9.5, letterSpacing: '0.18em',
              color: T.warn, textTransform: 'uppercase',
              textAlign: 'center', lineHeight: 1.4,
              marginBottom: 8, flexShrink: 0,
            }}>
              {itemsError}
            </div>
          )}

          <div ref={listScrollRef} className="scroll-thin" style={{
            display: 'flex', flexDirection: 'column', gap: 8,
            flex: 1, minHeight: 0, overflowY: 'auto', paddingBottom: 4,
          }}>
            {itemsLoading && items.length === 0 && (
              <div style={{
                fontFamily: T.mono, fontSize: 10, letterSpacing: '0.22em',
                color: T.text3, textTransform: 'uppercase',
                textAlign: 'center', padding: '24px 0',
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              }}>

// ─────────────────────────────────────────────────────────────
// Screen 3 — Countdown (3-2-1-GO)
// ─────────────────────────────────────────────────────────────
function Countdown({ onComplete }) {
  const [count, setCount] = useState(3);
  const [phase, setPhase] = useState('count');

  useEffect(() => {
    if (phase !== 'count') return;
    if (count === 0) {
      setPhase('launch');
      onComplete();
      return;
    }
    const t = setTimeout(() => setCount(c => c - 1), 900);
    return () => clearTimeout(t);
  }, [count, phase]);

  const display = phase === 'launch' ? 'GO' : (count === 0 ? 'GO' : count);
  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      position: 'relative', overflow: 'hidden',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: `radial-gradient(circle at 50% 50%, rgba(0,229,255,0.18), transparent 55%)`,
        animation: 'breathe 1.8s ease-in-out infinite',
      }} />
      {[0, 1, 2].map(i => (
        <div key={i} style={{
          position: 'absolute', width: 220 + i * 90, height: 220 + i * 90,
          borderRadius: '50%', border: `1px solid ${T.hairline}`,
          opacity: 1 - i * 0.25,
          animation: `ringPulse 2s ease-out ${i * 0.25}s infinite`,
        }} />
      ))}
      <Eyebrow color={T.cyan} style={{ position: 'absolute', top: 100 }}>
        {phase === 'launch' ? 'Ignition' : 'Final Countdown'}
      </Eyebrow>
      <div key={display} style={{
        fontFamily: T.display, fontSize: phase === 'launch' ? 120 : 180,
        fontWeight: 600, letterSpacing: '-0.04em',
        color: T.text, lineHeight: 1,
        textShadow: `0 0 60px ${T.cyan}, 0 0 120px ${T.blue}`,
        animation: 'countIn 700ms cubic-bezier(0.2, 0.8, 0.2, 1)',
        position: 'relative', zIndex: 2,
      }}>
        {display}
      </div>
      <div style={{
        fontFamily: T.mono, fontSize: 11, letterSpacing: '0.24em',
        color: T.text3, marginTop: 24, textTransform: 'uppercase',
        position: 'relative', zIndex: 2,
      }}>
        {phase === 'launch' ? 'Launch initiated · executing' : 'Engaging launch protocol'}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// MarqueeText — renders text statically when it fits, and seamlessly
// scrolls it right-to-left in a loop when it overflows the container.
// Used by the checkpoint badge on each execution card.
// ─────────────────────────────────────────────────────────────
function MarqueeText({ text, textStyle, gap = 36, pxPerSecond = 50 }) {
  const containerRef = useRef(null);
  const measureRef = useRef(null);
  const [shouldScroll, setShouldScroll] = useState(false);
  const [duration, setDuration] = useState(12);

  useEffect(() => {
    const container = containerRef.current;
    const measure = measureRef.current;
    if (!container || !measure) return;

    const check = () => {
      const containerW = container.clientWidth;
      const textW = measure.scrollWidth;
      const overflows = textW > containerW + 1;
      setShouldScroll(overflows);
      if (overflows) {
        // Speed scales with text length so longer strings don't whip by.
        setDuration(Math.max(8, (textW + gap) / pxPerSecond));
      }
    };

    const frame = requestAnimationFrame(check);
    let ro;
    if (typeof ResizeObserver !== 'undefined') {
      ro = new ResizeObserver(check);
      ro.observe(container);
      ro.observe(measure);
    }
    if (typeof document !== 'undefined' && document.fonts && document.fonts.ready) {
      document.fonts.ready.then(check).catch(() => {});
    }
    return () => {
      cancelAnimationFrame(frame);
      if (ro) ro.disconnect();
    };
  }, [text, gap, pxPerSecond]);

  const fadeMask = shouldScroll
    ? 'linear-gradient(to right, transparent 0, black 14px, black calc(100% - 14px), transparent 100%)'
    : 'none';

  return (
    <div
      ref={containerRef}
      style={{
        flex: 1, minWidth: 0,
        overflow: 'hidden',
        position: 'relative',
        maskImage: fadeMask,
        WebkitMaskImage: fadeMask,
      }}
    >
      {/* hidden width probe — always reflects single-copy width */}
      <span
        ref={measureRef}
        aria-hidden="true"
        style={{
          ...textStyle,
          visibility: 'hidden',
          position: 'absolute',
          top: 0, left: 0,
          whiteSpace: 'nowrap',
          pointerEvents: 'none',
        }}
      >
        {text}
      </span>

      {shouldScroll ? (
        <div
          style={{
            display: 'inline-flex',
            whiteSpace: 'nowrap',
            animation: `marqueeScroll ${duration}s linear infinite`,
            willChange: 'transform',
          }}
        >
          <span style={{ ...textStyle, paddingRight: gap }}>{text}</span>
          <span style={{ ...textStyle, paddingRight: gap }} aria-hidden="true">{text}</span>
        </div>
      ) : (
        <span style={{ ...textStyle, whiteSpace: 'nowrap' }}>{text}</span>
      )}
    </div>
  );
}

    setExiting(false);
    setEntering(true);

                    textTransform: 'uppercase', fontWeight: 700,

        </div>
      </div>

      <div style={{ padding: '0 24px' }}>
        <GlowButton onClick={handleComplete} disabled={loading || !step}>

            ? 'Generating Steps…'

            <svg width="14" height="14" viewBox="0 0 14 14">

          {loading || !step
            ? 'Claude is preparing your checkpoints'
            : stepIdx + 1 < totalSteps
              ? `${totalSteps - stepIdx - 1} more checkpoint${totalSteps - stepIdx - 1 === 1 ? '' : 's'} to go`
              : 'Final checkpoint · launch nearly complete'}
        </div>
      </div>

      <EditStepModal
        open={editOpen}
        step={step}
        stepIdx={stepIdx}
        totalSteps={totalSteps}
        mission={mission}
        onClose={() => setEditOpen(false)}
        onPick={(newTitle) => {
          onEditStep(newTitle);
          setEditOpen(false);
        }}
      />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Quick Edit Modal
// ─────────────────────────────────────────────────────────────
function EditStepModal({ open, step, stepIdx, totalSteps, mission, onClose, onPick }) {
  const [currentAlts, setCurrentAlts] = useState([]);
  const [seenOptions, setSeenOptions] = useState([]);
  const [genError, setGenError] = useState('');
  const [customDraft, setCustomDraft] = useState('');
  const [listening, setListening] = useState(false);
  const [transcribing, setTranscribing] = useState(false);
  const [recError, setRecError] = useState('');
  const [refreshing, setRefreshing] = useState(false);
  const recRef = useRef(null);

  const micAvailable = useMemo(
    () => typeof window !== 'undefined'
      && !!navigator?.mediaDevices?.getUserMedia
      && typeof window.MediaRecorder !== 'undefined',
    []
  );

  // Tracks whether we've already auto-fetched alts for the current open session.
  // Resets when the step changes or the modal closes.
  const autoFetchedRef = useRef(false);

  // Seed currentAlts from the step's local altPool whenever the step changes.
  // Steps generated by Claude don't carry altPool, so this leaves an empty list
  // — the open-effect below catches that and triggers an API fetch.
  useEffect(() => {
    if (!step) return;
    const pool = step.altPool || [];
    const initial = [];
    for (const v of pool) {
      if (initial.length >= 3) break;
      if (v && v !== step.title && !initial.includes(v)) initial.push(v);
    }
    setCurrentAlts(initial);
    setSeenOptions(initial.slice());
    setGenError('');
    autoFetchedRef.current = false;
  }, [step]);

  // Auto-fetch from Claude when the modal opens with no alternatives loaded.
  useEffect(() => {
    if (!open) {
      autoFetchedRef.current = false;
      return;
    }
    if (!step || autoFetchedRef.current || refreshing) return;
    if (currentAlts.length > 0) {
      autoFetchedRef.current = true;
      return;
    }
    autoFetchedRef.current = true;
    handleRegenerate();
  }, [open, step, currentAlts.length, refreshing]);

  useEffect(() => {
    if (open) {
      setCustomDraft('');
      setListening(false);
      setTranscribing(false);
      setRecError('');
      setRefreshing(false);
    }
  }, [open, stepIdx]);

  // Tear down any in-flight recording when the modal closes.
  useEffect(() => {
    if (open) return;
    const r = recRef.current;
    if (r) {
      r.cancelled = true;
      try { r.recorder?.state === 'recording' && r.recorder.stop(); } catch {}
      r.stream?.getTracks().forEach(t => { try { t.stop(); } catch {} });
      recRef.current = null;
    }
  }, [open]);

  const startRecording = async () => {
    setRecError('');
    if (!micAvailable) {
      setRecError('Mic capture not supported in this browser');
      return;
    }
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      setRecError(err.name === 'NotAllowedError'
        ? 'Microphone permission denied'
        : 'Could not access microphone: ' + (err.message || err.name));
      return;
    }

    // Pick a Whisper-compatible mime type that the browser actually supports.
    const candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg;codecs=opus', 'audio/ogg'];
    let mimeType = '';
    for (const mt of candidates) {
      if (window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(mt)) {
        mimeType = mt;
        break;
      }
    }

    let recorder;
    try {
      recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    } catch (err) {
      stream.getTracks().forEach(t => t.stop());
      setRecError('Recorder init failed: ' + err.message);
      return;
    }

    const chunks = [];
    const ref = { recorder, stream, chunks, mimeType: mimeType || recorder.mimeType, cancelled: false };
    recRef.current = ref;

    recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };

    recorder.onstop = async () => {
      stream.getTracks().forEach(t => { try { t.stop(); } catch {} });
      if (ref.cancelled) return;
      if (chunks.length === 0) {
        setRecError('No audio captured. Try holding closer to the mic.');
        return;
      }

      const blob = new Blob(chunks, { type: ref.mimeType || 'audio/webm' });
      const ext = (ref.mimeType.includes('mp4') ? 'mp4'
                  : ref.mimeType.includes('ogg') ? 'ogg'
                  : 'webm');

      setTranscribing(true);
      try {
        const fd = new FormData();
        fd.append('audio', blob, `audio.${ext}`);
        const res = await fetch('/api/transcribe', { method: 'POST', body: fd });
        const data = await res.json().catch(() => ({}));
        if (ref.cancelled) return;
        if (!res.ok) {
          setRecError(data.error || `Transcription failed (${res.status})`);
        } else if (data.text) {
          setCustomDraft(prev => (prev ? prev.trim() + ' ' : '') + data.text.trim());
        } else {
          setRecError('No transcription returned');
        }
      } catch (err) {
        if (!ref.cancelled) setRecError('Network error: ' + err.message);
      } finally {
        if (!ref.cancelled) setTranscribing(false);
        if (recRef.current === ref) recRef.current = null;
      }
    };

    recorder.onerror = (e) => {
      setRecError('Recorder error: ' + (e.error?.message || 'unknown'));
      setListening(false);
    };

    recorder.start();
    setListening(true);
  };

  const stopRecording = () => {
    const r = recRef.current;
    if (r && r.recorder.state === 'recording') {
      try { r.recorder.stop(); } catch {}
    }
    setListening(false);
  };

  const toggleMic = () => {
    if (listening) stopRecording();
    else startRecording();
  };

  if (!open || !step) return null;

  const handleRegenerate = async () => {
    if (refreshing) return;
    setRefreshing(true);
    setGenError('');

    // Sandboxed previews (about:srcdoc, file://, blob:) can't resolve
    // relative fetch URLs. Skip the API call there and use local pool quietly.
    const canCallAPI = typeof window !== 'undefined'
      && /^https?:$/.test(window.location?.protocol || '');

    try {
      if (!canCallAPI) throw new Error('__skip_api__');
      const res = await fetch('/api/generate-options', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          mission: mission || '',
          stepTag: step.tag,
          currentStep: step.title,
          seenOptions: [...seenOptions, step.title],
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !Array.isArray(data.options) || data.options.length === 0) {
        throw new Error(data.error || `Generator returned ${res.status}`);
      }
      const fresh = data.options.slice(0, 3);
      setCurrentAlts(fresh);
      setSeenOptions(prev => [...prev, ...fresh]);
    } catch (err) {
      // Fall back to the local altPool — pick 3 unseen entries.
      const pool = step.altPool || [];
      const seen = new Set([...seenOptions, step.title]);
      const fallback = [];
      for (const v of pool) {
        if (fallback.length >= 3) break;
        if (v && !seen.has(v)) fallback.push(v);
      }
      if (fallback.length > 0) {
        setCurrentAlts(fallback);
        setSeenOptions(prev => [...prev, ...fallback]);
      }
      if (err.message !== '__skip_api__') {
        setGenError(err.message || 'Could not generate new options');
      }
    } finally {
      setRefreshing(false);
    }
  };

  const handleCustomSubmit = () => {
    const t = customDraft.trim();
    if (!t) return;
    onPick(t);
  };

  return (
    <div
      onClick={onClose}
      style={{
        position: 'fixed', inset: 0, zIndex: 50,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 20,
        background: 'rgba(2,4,8,0.62)',
        backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)',
        animation: 'backdropIn 220ms ease',
      }}
    >
      <div
        onClick={e => e.stopPropagation()}
        style={{
          width: '100%', maxWidth: 360,
          background: 'linear-gradient(160deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025) 55%, rgba(0,229,255,0.05))',
          border: `1px solid rgba(0,229,255,0.42)`,
          borderRadius: 24,
          padding: '18px 16px 16px',
          boxShadow: `
            0 0 0 1px rgba(255,255,255,0.05) inset,
            0 30px 80px rgba(0,0,0,0.6),
            0 0 60px rgba(0,229,255,0.18)
          `,
          backdropFilter: 'blur(24px)', WebkitBackdropFilter: 'blur(24px)',
          animation: 'modalIn 280ms cubic-bezier(0.2,0.8,0.2,1)',
          position: 'relative', overflow: 'hidden',
        }}
      >
        <div style={{
          position: 'absolute', top: -60, left: '50%', transform: 'translateX(-50%)',
          width: 240, height: 160,
          background: `radial-gradient(ellipse, rgba(0,229,255,0.28), transparent 70%)`,
          pointerEvents: 'none',
        }} />

        <div style={{ position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{
              width: 6, height: 6, borderRadius: 99, background: T.teal,
              boxShadow: `0 0 8px ${T.teal}`,
            }} />
            <span style={{
              fontFamily: T.mono, fontSize: 9.5, letterSpacing: '0.24em',
              color: T.teal, textTransform: 'uppercase', fontWeight: 600,
              textShadow: `0 0 8px ${T.teal}66`,
            }}>Quick Edit</span>
            <span style={{
              fontFamily: T.mono, fontSize: 9.5, letterSpacing: '0.2em',
              color: T.text3, textTransform: 'uppercase',
            }}>· Step {stepIdx + 1}/{totalSteps}</span>
          </div>
          <button onClick={onClose} aria-label="Close" style={{
            all: 'unset', cursor: 'pointer',
            width: 28, height: 28, borderRadius: 99,
            background: 'rgba(255,255,255,0.05)',
            border: `1px solid ${T.hairlineSoft}`,
            color: T.text2,
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <svg width="9" height="9" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>
          </button>
        </div>

        <div style={{ position: 'relative', marginBottom: 14, paddingBottom: 12, borderBottom: `1px solid ${T.hairlineSoft}` }}>
          <div style={{
            fontFamily: T.mono, fontSize: 9, letterSpacing: '0.22em',
            color: T.text3, textTransform: 'uppercase', marginBottom: 4,
          }}>Currently</div>
          <div style={{
            fontFamily: T.display, fontSize: 14, color: T.text2, fontWeight: 500,
            lineHeight: 1.3,
          }}>{step.title}</div>
        </div>

        <div style={{ position: 'relative', marginBottom: 14 }}>
          <div style={{
            display: 'flex', alignItems: 'center', gap: 6, marginBottom: 10,
            fontFamily: T.mono, fontSize: 10, letterSpacing: '0.22em',
            color: T.cyan, textTransform: 'uppercase', fontWeight: 600,
          }}>
            <span style={{ width: 4, height: 4, borderRadius: 99, background: T.cyan, boxShadow: `0 0 6px ${T.cyan}` }} />
            Better options
          </div>
          <div style={{
            display: 'flex', flexDirection: 'column', gap: 8,
            opacity: refreshing ? 0.35 : 1,
            transition: 'opacity 240ms ease',
          }}>
            {currentAlts.map((a, i) => (
              <button
                key={`${i}-${a}`}
                onClick={() => onPick(a)}
                style={{
                  all: 'unset', cursor: 'pointer',
                  padding: '11px 14px',
                  background: 'rgba(0,229,255,0.05)',
                  border: `1px solid rgba(0,229,255,0.22)`,
                  borderRadius: 12,
                  fontFamily: T.display, fontSize: 14, fontWeight: 500, color: T.text,
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10,
                  transition: 'all 200ms ease',
                  animation: `optionIn 280ms ${i * 60}ms cubic-bezier(0.2,0.8,0.2,1) backwards`,
                }}
              >
                <span style={{ flex: 1 }}>{a}</span>
                <svg width="12" height="12" viewBox="0 0 12 12" style={{ flexShrink: 0, color: T.cyan }}>
                  <path d="M2 6h7m0 0L6 3m3 3L6 9" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            ))}
          </div>
        </div>

        <button
          onClick={handleRegenerate}
          disabled={refreshing}
          style={{
            cursor: refreshing ? 'default' : 'pointer',
            position: 'relative',
            width: '100%', padding: '11px 14px',
            boxSizing: 'border-box',
            background: 'rgba(168,118,255,0.10)',
            border: `1px solid rgba(168,118,255,0.34)`,
            borderRadius: 12,
            fontFamily: T.mono, fontSize: 10.5, letterSpacing: '0.18em',
            color: T.purple, textTransform: 'uppercase', fontWeight: 600,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            marginBottom: 16,
            WebkitAppearance: 'none', appearance: 'none',
            WebkitTapHighlightColor: 'transparent',
          }}
        >
          <svg width="12" height="12" viewBox="0 0 12 12" style={{
            animation: refreshing ? 'spin360 800ms linear infinite' : 'none',
          }}>
            <path d="M10 6a4 4 0 1 1-1.2-2.85M10 1.5V4H7.5" stroke="currentColor" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          {refreshing ? 'Generating…' : 'Generate new options'}
        </button>

        {genError && (
          <div style={{
            fontFamily: T.mono, fontSize: 9.5, letterSpacing: '0.18em',
            color: T.warn, textTransform: 'uppercase', marginTop: -8, marginBottom: 14,
            textAlign: 'center', lineHeight: 1.4,
          }}>
            {genError} — using local fallback
          </div>
        )}

        <div style={{
          fontFamily: T.mono, fontSize: 9.5, letterSpacing: '0.22em',
          color: T.text3, textTransform: 'uppercase', marginBottom: 8,
          position: 'relative',
        }}>Or write your own</div>
        <div style={{
          position: 'relative',
          display: 'flex', alignItems: 'center', gap: 8,
          padding: '8px 8px 8px 12px',
          background: 'rgba(255,255,255,0.04)',
          border: `1px solid ${listening ? T.teal : T.hairlineSoft}`,
          borderRadius: 12,

            value={customDraft}

              </svg>
            </button>

            <button
              onClick={toggleMic}
              disabled={transcribing}
              aria-label={listening ? 'Stop voice input' : 'Voice input'}
              style={{
                all: 'unset', cursor: transcribing ? 'default' : 'pointer', flexShrink: 0,
                width: 30, height: 30, borderRadius: 99,
                background: listening
                  ? `linear-gradient(180deg, ${T.teal}, ${T.cyan})`
                  : transcribing ? 'rgba(168,118,255,0.18)' : 'rgba(255,255,255,0.06)',
                border: `1px solid ${listening ? 'transparent' : transcribing ? 'rgba(168,118,255,0.4)' : T.hairlineSoft}`,
                color: listening ? '#001018' : transcribing ? T.purple : T.text2,
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                transition: 'all 220ms ease',
                boxShadow: listening ? `0 0 12px ${T.teal}99` : 'none',
              }}

              {transcribing ? (
                <svg width="12" height="12" viewBox="0 0 12 12" style={{ animation: 'spin360 800ms linear infinite' }}>
                  <path d="M10 6a4 4 0 1 1-1.2-2.85M10 1.5V4H7.5" stroke="currentColor" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>

                <svg width="13" height="13" viewBox="0 0 14 14">
                  <path d="M7 1.8a1.9 1.9 0 0 0-1.9 1.9v3.2a1.9 1.9 0 1 0 3.8 0V3.7A1.9 1.9 0 0 0 7 1.8z" fill="currentColor"/>
                  <path d="M3.5 7a3.5 3.5 0 0 0 7 0M7 10.5V12.4M5 12.4h4" stroke="currentColor" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
                </svg>
              )}
            </button>
          ) : null}
        </div>
        {(listening || transcribing || recError) && (
          <div style={{
            fontFamily: T.mono, fontSize: 10, letterSpacing: '0.22em',
            color: recError ? T.warn : transcribing ? T.purple : T.teal,
            textTransform: 'uppercase', marginTop: 8, textAlign: 'center',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
            lineHeight: 1.3,

              }} />
            )}
            {recError ? recError : transcribing ? 'Transcribing…' : 'Listening…'}
          </div>
        )}
      </div>
    </div>
  );
}

function CompletedSteps({ onBack }) {
  const [items, setItems] = useState([]);

  const [expandedIds, setExpandedIds] = useState(() => new Set());
  const [restoringId, setRestoringId] = useState(null);

  const canCallAPI = typeof window !== 'undefined'
    && /^https?:$/.test(window.location?.protocol || '');

  useEffect(() => {
    if (!canCallAPI) { setLoading(false); return; }
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch('/api/completed', { cache: 'no-store' });
        const data = await res.json().catch(() => ({}));
        if (cancelled) return;
        if (!res.ok) throw new Error(data.error || `Failed (${res.status})`);
        setItems(Array.isArray(data.items) ? data.items : []);
      } catch (err) {
        if (!cancelled) setError(err.message || 'Could not load completed list');
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const toggleExpand = (id) => {
    setExpandedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  const handleRestore = async (id) => {
    if (restoringId) return;
    setRestoringId(id);
    setError(null);
    // Optimistic remove from this view.
    const before = items;
    setItems(prev => prev.filter(i => i.id !== id));
    try {
      const res = await fetch('/api/completed?action=restore', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Failed (${res.status})`);
      if (Array.isArray(data.items)) setItems(data.items);
